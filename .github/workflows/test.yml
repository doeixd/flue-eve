name: test

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  vitest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: pnpm

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y liblzma-dev

      - name: Install vite-plus
        run: npm install -g vite-plus@0.1.24

      - name: Install dependencies
        run: vp install

      - name: Build
        run: vp exec -- pnpm --filter "./packages/*" run build

      - name: Test
        run: vp test

      - name: Build docs (no deploy)
        run: vp exec -- pnpm --filter @flue-eve/docs build

  cloudflare-smoke:
    if: ${{ false }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: pnpm

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y liblzma-dev

      - name: Install vite-plus
        run: npm install -g vite-plus@0.1.24

      - name: Install dependencies
        run: vp install

      - name: Build
        run: vp exec -- pnpm --filter "./packages/*" run build

      - name: Cloudflare Worker smoke
        run: vp exec -- node scripts/smoke-cloudflare-ci.mjs
